name: Build and Deploy to Firebase
on: [push]

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      CI: false
      REACT_APP_FIREBASE_KEY: ${{ secrets.FIREBASE_KEY }}
      REACT_APP_FIREBASE_DOMAIN: ${{ secrets.FIREBASE_DOMAIN }}
      REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      REACT_APP_FIREBASE_SENDER_ID: ${{ secrets.FIREBASE_SENDER_ID }}
      REACT_APP_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
      REACT_APP_FULLBODY_TOKEN_KEY: ${{ secrets.FULLBODY_TOKEN_KEY }}
      REACT_APP_TTXC_TOKEN_KEY: ${{ secrets.TTXC_TOKEN_KEY }}
      REACT_APP_S168_TOKEN_KEY: ${{ secrets.S168_TOKEN_KEY }}
      REACT_APP_OPENDAY_TOKEN_KEY: ${{ secrets.OPENDAY_TOKEN_KEY }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Install and build
        run: |
          npm install
          npm run build
      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: node-build
          path: build

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Download builds
        uses: actions/download-artifact@v4
        with:
          name: node-build
          path: build
      - name: Deploy to Firebase
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
